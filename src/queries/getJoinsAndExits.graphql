query GetPoolJoinExits($poolIds: [String!]) {
  poolGetJoinExits(
    where: {
      poolIdIn: $poolIds
      chainIn: [
        BASE
        ARBITRUM
        MAINNET
        SEPOLIA
        OPTIMISM
        GNOSIS
        FANTOM
        ZKEVM
        POLYGON
        AVALANCHE
      ]
    }
  ) {
    chain
    id
    sender
    timestamp
    tx
    valueUSD
    type
    amounts {
      address
      amount
    }
    poolId
  }
}
