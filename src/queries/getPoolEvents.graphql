query GetPoolEvents($first: Int, $skip: Int, $where: GqlPoolEventsFilter) {
  poolEvents(first: $first, skip: $skip, where: $where) {
    id
    poolId
    blockNumber
    blockTimestamp
    timestamp
    type
    chain
    valueUSD
    sender
    tx
    ... on GqlPoolSwapEventV3 {
      tokenIn {
        address,
        amount,
        valueUSD
      }
      tokenOut {
        address,
        amount,
        valueUSD
      }
    }
  }
}
