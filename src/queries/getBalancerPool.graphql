query GetPoolById($id: String!, $chain: GqlChain!) {
  poolGetPool(id: $id, chain: $chain) {
    __typename
    address
    chain
    name
    decimals
    type
    hook {
      type
    }
    id
    symbol
    createTime
    owner
    poolTokens {
      __typename
      weight
      symbol
      address
      index
    }
    dynamicData {
      poolId
      fees24h
      swapFee
      totalLiquidity
      totalShares
      volume24h
      aprItems {
        id
        apr
        type
        rewardTokenSymbol
      }
      yieldCapture48h
    }
    tags
    ... on GqlPoolQuantAmmWeighted {
      quantAmmWeightedParams {
        absoluteWeightGuardRail
        details {
          name
          category
          type
          value
        }
        epsilonMax
        lambda
        lastInterpolationTimePossible
        lastUpdateIntervalTime
        maxTradeSizeRatio
        oracleStalenessThreshold
        poolRegistry
        updateInterval
        weightBlockMultipliers
        weightsAtLastUpdateInterval
      }
    }
  }
}
