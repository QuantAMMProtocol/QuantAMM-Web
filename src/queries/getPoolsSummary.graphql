query GetPoolsSummary(
  $first: Int
  $orderBy: GqlPoolOrderBy
  $orderDirection: GqlPoolOrderDirection
  $skip: Int
  $textSearch: String
  $where: GqlPoolFilter
) {
  poolGetPools(
    first: $first
    orderBy: $orderBy
    orderDirection: $orderDirection
    skip: $skip
    textSearch: $textSearch
    where: $where
  ) {
    __typename
    chain
    name
    id
    dynamicData {
      totalLiquidity
      volume24h
    }
  }
}
